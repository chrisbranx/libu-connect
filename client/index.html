<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LIBU Connect - Your campus, connected." />
    <meta name="theme-color" content="#2563EB" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>LIBU Connect</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      .splash { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; transition: opacity 0.5s; }
      .splash.dark { background: #030712; }
      @media (prefers-color-scheme: dark) { .splash { background: #030712; } .splash .l { color: #3B82F6; } .splash .t { color: #F3F4F6; } }
      @media (prefers-color-scheme: light) { .splash .l { color: #2563EB; } .splash .t { color: #111827; } }
      .splash-bounce { display: flex; gap: 2px; }
      .splash-bounce span { display: inline-block; font-size: 3rem; font-weight: 700; animation: bounce 2s ease-in-out infinite; }
      .splash-bounce span:nth-child(1) { animation-delay: 0s; }
      .splash-bounce span:nth-child(2) { animation-delay: 0.1s; }
      .splash-bounce span:nth-child(3) { animation-delay: 0.2s; }
      .splash-bounce span:nth-child(4) { animation-delay: 0.3s; }
      .splash-bounce span:nth-child(5) { animation-delay: 0.4s; }
      .splash-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #F59E0B; margin-top: 8px; animation: bounce 2s ease-in-out infinite; animation-delay: 0.4s; }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      .splash-sub { margin-top: 16px; font-size: 0.75rem; color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; }
      .splash-loader { margin-top: 32px; width: 28px; height: 28px; border-radius: 50%; border: 2px solid #2563EB; border-top-color: transparent; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) { .splash-loader { border-color: #3B82F6; border-top-color: transparent; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash" id="splash">
        <div class="splash-bounce">
          <span class="l">L</span>
          <span class="t">I</span>
          <span class="t">B</span>
          <span class="t">U</span>
          <span class="splash-dot"></span>
        </div>
        <div class="splash-sub">Connect</div>
        <div class="splash-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
